name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Public safety (no secrets / personal paths)
        run: python tests/test_public_safety.py
      - name: API keys unit smoke
        run: python tests/test_api_keys.py
      - name: OpenAI compat gate
        run: python tests/test_openai_compat.py
      - name: Security SSRF smoke
        run: python tests/test_security.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t routism:ci .
